# Copilot Studio Topic: Program FAQ
# This topic is backed by the official policy PDF uploaded to the
# Copilot Studio knowledge base. The agent uses generative answers
# to respond to policy questions not covered by the other specific topics.
#
# Knowledge source: Upload the Vehicle Allowance Policy PDF to
#   Copilot Studio > Knowledge > Add knowledge source > File
#
# Trigger: Any policy question not matched by other topics
# (Copilot Studio will route to this topic as a fallback for
#  knowledge base questions when generative answers are enabled)

kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Program FAQ
    triggerQueries:
      - how does the vehicle allowance work
      - what is the vehicle allowance
      - when can I opt in
      - when can I opt out
      - opt out deadline
      - August 1
      - can I use a company vehicle
      - fuel card
      - electric vehicle allowance
      - EV charging allowance
      - what happens if my insurance lapses
      - vehicle requirements
      - how old can my vehicle be
      - pickup or SUV
      - can I lease
      - can I buy used
      - effective date
      - when do I start getting paid
      - is the allowance taxed
      - what if I change vehicles
  actions:
    - kind: GenerativeAnswers
      id: policyAnswer
      displayName: Answer from Policy Knowledge Base
      # Copilot Studio will use the uploaded policy PDF to generate answers
      # Configure in Copilot Studio: Settings > Generative AI > Enable generative answers
      fallbackMessage: "I couldn't find a specific answer to that in the policy. Please contact the Equipment Department for assistance."
      citations: true

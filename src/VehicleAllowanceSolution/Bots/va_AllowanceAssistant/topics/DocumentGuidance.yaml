# Copilot Studio Topic: Document Guidance
# Trigger phrases: "what documents do I need", "insurance requirements",
#                  "what is a dec page", "additional insured vs additional interest"
#
# Guides employees through the required documentation using the policy knowledge base.
# Answers common questions without needing a human.

kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Document Guidance
    triggerQueries:
      - what documents do I need
      - insurance requirements
      - what is a dec page
      - declaration page
      - additional insured
      - additional interest
      - umbrella policy
      - what coverage do I need
      - window sticker
      - what is the MSRP
      - documents for vehicle allowance
      - what do I need to submit
  actions:
    - kind: SendMessage
      id: docOverview
      message: "Here are the four documents required for your vehicle allowance application. All must be submitted together."
      attachments:
        - kind: AdaptiveCard
          content:
            type: AdaptiveCard
            body:
              - type: TextBlock
                text: "Required Documents"
                weight: Bolder
              - type: FactSet
                facts:
                  - title: "1. Auto Insurance Dec Pages"
                    value: "Must show: $500K Combined Single Limit OR ($250K/$500K Bodily Injury + $100K Property Damage)"
                  - title: "2. Endorsement on Auto Policy"
                    value: "Your company must be listed as Additional Insured OR Additional Interest"
                  - title: "3. Umbrella/Excess Liability Dec Pages"
                    value: "If Additional Insured: $1M minimum. If Additional Interest: $2M minimum. Vehicle must be covered."
                  - title: "4. Manufacturer's Window Sticker"
                    value: "Clear photo or scan. Must show the Total MSRP (bottom of sticker) and matching VIN."
              - type: TextBlock
                text: "Need help with the endorsement address for your company? Ask me 'what is the endorsement address'."
                wrap: true
                isSubtle: true
    - kind: Question
      id: followUp
      prompt: "Do you have a specific question about any of these documents?"
      entity:
        kind: ClosedListEntity
        items:
          - displayName: "What is a declaration page?"
            synonyms: ["dec page", "declaration page", "what is a dec page"]
          - displayName: "Additional Insured vs. Additional Interest?"
            synonyms: ["additional insured", "additional interest", "difference between"]
          - displayName: "Endorsement address for my company?"
            synonyms: ["endorsement address", "company address", "which entity"]
          - displayName: "No more questions"
            synonyms: ["no", "that's it", "done", "I'm good"]
      output: Topic.FollowUpChoice
    - kind: ConditionGroup
      conditions:
        - id: decPage
          condition: =Topic.FollowUpChoice = "What is a declaration page?"
          actions:
            - kind: SendMessage
              id: explainDecPage
              message: "A Declaration Page (dec page) is the summary page of your insurance policy — typically the first 1-2 pages. It shows the policy number, coverage effective and expiration dates, named insured, and the coverage limits. Your insurance agent or carrier can provide this. Do NOT submit an insurance application, binder, or ID card — only the actual policy declaration page."
        - id: endorsement
          condition: =Topic.FollowUpChoice = "Additional Insured vs. Additional Interest?"
          actions:
            - kind: SendMessage
              id: explainEndorsement
              message: "Both options add your employer to your auto policy, but with different coverage implications:\n\n**Additional Insured** — Your employer has direct coverage under your policy. This requires a $1M umbrella policy minimum.\n\n**Additional Interest** — Your employer is notified of policy changes/cancellations but doesn't have direct coverage. This requires a $2M umbrella policy minimum.\n\nEither option is acceptable. Ask your insurance agent which is easier to add to your policy."
        - id: address
          condition: =Topic.FollowUpChoice = "Endorsement address for my company?"
          actions:
            - kind: SendMessage
              id: showAddress
              message: "All company entities use the same mailing address:\n\n**[Your Company Legal Entity Name]**\nAttn: Equipment Department\n730 N 1500 W\nOrem, UT 84057\n\nThe specific legal entity name depends on which subsidiary you work for. You can select your company in the portal application and it will show you the exact name to use."

name: Deploy to Test

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy-test" to confirm deployment to Test environment'
        required: true

jobs:
  deploy-test:
    name: Pack & Import to Test
    runs-on: windows-latest
    if: github.event.inputs.confirm == 'deploy-test'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PAC CLI
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Pack solution (Managed for Test/Prod)
        uses: microsoft/powerplatform-actions/pack-solution@v1
        with:
          solution-folder: src/VehicleAllowanceSolution
          solution-file: out/VehicleAllowanceSolution_managed.zip
          solution-type: Managed

      - name: Import solution to Test
        uses: microsoft/powerplatform-actions/import-solution@v1
        with:
          environment-url: ${{ secrets.PP_TEST_ENVIRONMENT_URL }}
          app-id: ${{ secrets.PP_CLIENT_ID }}
          client-secret: ${{ secrets.PP_CLIENT_SECRET }}
          tenant-id: ${{ secrets.PP_TENANT_ID }}
          solution-file: out/VehicleAllowanceSolution_managed.zip
          force-overwrite: true
          publish-changes: true
          deployment-settings-file: config/test-environment-variables.json

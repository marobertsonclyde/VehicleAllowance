name: Build & Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'specs/**'

jobs:
  code-app:
    name: Lint, Typecheck, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/employee-portal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/employee-portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: code-app-dist
          path: apps/employee-portal/dist/

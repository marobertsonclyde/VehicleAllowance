name: Deploy Solution

on:
  push:
    branches: [main]
    paths:
      - 'src/**'

jobs:
  deploy:
    name: Pack & Import Solution
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PAC CLI
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Pack solution
        uses: microsoft/powerplatform-actions/pack-solution@v1
        with:
          solution-folder: src/VehicleAllowanceSolution
          solution-file: out/VehicleAllowanceSolution.zip
          solution-type: Unmanaged

      - name: Import solution
        uses: microsoft/powerplatform-actions/import-solution@v1
        with:
          environment-url: ${{ secrets.PP_ENVIRONMENT_URL }}
          app-id: ${{ secrets.PP_CLIENT_ID }}
          client-secret: ${{ secrets.PP_CLIENT_SECRET }}
          tenant-id: ${{ secrets.PP_TENANT_ID }}
          solution-file: out/VehicleAllowanceSolution.zip
          force-overwrite: true
          publish-changes: true
          deployment-settings-file: config/environment-variables.json

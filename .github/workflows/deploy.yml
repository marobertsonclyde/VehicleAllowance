name: Deploy Code App

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'

jobs:
  deploy-dev:
    name: Build & Publish to Dev
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/employee-portal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/employee-portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install PAC CLI
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Authenticate
        run: |
          pac auth create \
            --applicationId ${{ secrets.PP_CLIENT_ID }} \
            --clientSecret ${{ secrets.PP_CLIENT_SECRET }} \
            --tenant ${{ secrets.PP_TENANT_ID }}

      - name: Publish code app
        run: pac code publish --solution-folder ./dist --environment ${{ secrets.PP_DEV_ENVIRONMENT_URL }}
